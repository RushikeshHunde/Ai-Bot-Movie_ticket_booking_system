<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment | CinePass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-slate-800 border border-slate-700 rounded-3xl p-8 shadow-2xl">
        <h2 class="text-2xl font-black text-center text-cyan-400 mb-6 uppercase tracking-widest">Complete Payment</h2>
        
        <div class="bg-slate-900/50 rounded-2xl p-4 border border-slate-700 mb-8 space-y-2">
            <div class="flex justify-between text-sm">
                <span class="text-slate-400">Passenger:</span>
                <span class="font-bold text-white" th:text="${userName}">John Doe</span>
            </div>
            <div class="flex justify-between text-sm">
                <span class="text-slate-400">Amount to Pay:</span>
                <span class="font-bold text-green-400 text-lg">₹<span th:text="${totalAmount}">0.0</span></span>
            </div>
        </div>

        <div class="flex flex-col items-center justify-center space-y-4">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Scan to Pay with UPI</p>
            <div class="bg-white p-4 rounded-2xl shadow-[0_0_20px_rgba(34,211,238,0.2)]">
                <img src="/images/my_qr.jpeg" alt="Payment QR Code" class="w-48 h-48 object-contain">
            </div>
            <p class="text-xs text-slate-400 italic">Accepting GPay, PhonePe, Paytm</p>
        </div>

        <form th:action="@{/confirm-payment}" method="post" class="mt-8">
            <input type="hidden" name="bookingId" th:value="${bookingId}">
            <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-black py-4 rounded-2xl transition-all transform active:scale-95">
                I HAVE PAID - DOWNLOAD TICKET
            </button>
        </form>
        <div th:replace="~{fragments/header :: ai-assistant}"></div>
    </div>

</body>
</html>
