<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div th:fragment="quick-admin-login" id="adminAuthModal" 
         class="hidden fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-md">
        
        <div class="bg-slate-900 border border-slate-700 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative animate-in fade-in zoom-in duration-300">
            <button onclick="toggleAdminAuthModal()" class="absolute top-6 right-6 text-slate-500 hover:text-white transition">
                <i class="fas fa-times text-xl"></i>
            </button>

            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-amber-500/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-amber-500/20">
                    <i class="fas fa-user-shield text-amber-500 text-2xl"></i>
                </div>
                <h2 class="text-2xl font-black text-white uppercase">Admin Verify</h2>
                <p class="text-slate-500 text-xs mt-1 font-bold tracking-widest uppercase">Authorized Personnel Only</p>
            </div>

            <form th:action="@{/admin/verify-and-edit}" method="POST" class="space-y-4">
                <input type="hidden" id="targetShowId" name="showId">
                
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Email Address</label>
                    <input type="email" name="email" required placeholder="admin@cinepass.com"
                           class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-cyan-500 transition">
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">Security Password</label>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:border-amber-500 transition">
                </div>

                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-400 text-slate-950 font-black py-4 rounded-2xl shadow-xl shadow-amber-500/20 transition-all hover:scale-[1.02] active:scale-95 mt-4">
                    VERIFY & PROCEED
                </button>
            </form>
        </div>
    </div>
</body>
</html>
