<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Bookings | CinePass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 p-8 text-white">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-black uppercase tracking-widest text-cyan-500">Booking Database</h1>
            <a href="/" class="bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 hover:bg-slate-700 transition">
                <i class="fas fa-arrow-left mr-2"></i> Back to Home
            </a>
        </div>

        <div class="bg-slate-900 rounded-[2rem] overflow-hidden border border-slate-800 shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-800/50 text-cyan-400 uppercase text-xs font-bold">
                    <tr>
                        <th class="p-5">ID</th>
                        <th class="p-5">Customer</th>
                        <th class="p-5">Movie</th>
                        <th class="p-5">Cinema/Hall</th>
                        <th class="p-5">Show Time</th>
                        <th class="p-5">Seats</th>
                        <th class="p-5 text-right">Amount</th>
                    </tr>
                </thead>
                <tbody class="text-sm divide-y divide-slate-800">
                    <tr th:each="t : ${allTickets}" class="hover:bg-slate-800/30 transition">
                        <td class="p-5 font-mono text-slate-500" th:text="'#' + ${t.ticketId}">#101</td>
                        <td class="p-5">
                            <div class="font-bold text-slate-200" th:text="${t.customerName}">Name</div>
                            <div class="text-[10px] text-slate-500" th:text="${t.customerEmail}">email@ex.com</div>
                        </td>
                        <td class="p-5 font-bold uppercase tracking-tight" th:text="${t.displayMovieTitle}">Movie</td>
                        <td class="p-5 text-slate-400" th:text="${t.displayHall}">Amanora Mall</td>
                        <td class="p-5 text-slate-400" th:text="${t.displayShowTime}">12 Mar, 6:00 PM</td>
                        <td class="p-5">
                            <span class="bg-cyan-500/10 text-cyan-500 px-2 py-1 rounded-md font-bold" th:text="${t.seatNumbers}">A1, A2</span>
                        </td>
                        <td class="p-5 text-right font-black text-green-500" th:text="'₹' + ${t.totalAmount}">₹0.00</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
