<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Admin Login | CinePass</title>
<script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style type="text/css">
.glass-card {
	background: rgba(30, 41, 59, 0.4); /* Slate-800 with 40% opacity */
	backdrop-filter: blur(16px) saturate(180%);
	-webkit-backdrop-filter: blur(16px) saturate(180%);
	border: 1px solid rgba(255, 255, 255, 0.1);
}

.glow-input:focus {
	box-shadow: 0 0 20px rgba(6, 182, 212, 0.15);
}

body {
	background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
}
</style>
</head>
<body
	class="text-white min-h-screen flex items-center justify-center p-6">

	<div class="w-full max-w-md">
		<div class="text-center mb-8">
			<a th:href="@{/}"
				class="text-4xl font-black bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent tracking-tighter">
				CINEPASS </a>
			<p
				class="text-slate-400 mt-2 text-sm font-medium uppercase tracking-widest">Admin
				Portal</p>
		</div>

		<div class="glass-card rounded-[2.5rem] p-10 shadow-2xl">
			<h2 class="text-2xl font-bold mb-8 text-center">Welcome Back</h2>

			<div th:if="${error}"
				class="mb-6 p-4 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 text-sm flex items-center">
				<i class="fas fa-exclamation-circle mr-3"></i> <span
					th:text="${error}"></span>
			</div>

			<form th:action="@{/admin/login}" method="post" class="space-y-6"
				action="">
				<div class="space-y-2">
					<label class="block text-xs font-bold text-cyan-500 uppercase ml-1">Admin
						Email</label>
					<div class="relative">
						<i
							class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
						<input type="email" name="email" required
							class="w-full bg-slate-900/60 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-cyan-500/50 glow-input transition text-white placeholder-slate-600"
							placeholder="admin@gmail.com">
					</div>
				</div>

				<div class="space-y-2">
					<label class="block text-xs font-bold text-cyan-500 uppercase ml-1">Password</label>
					<div class="relative">

						<i
							class="fas fa-lock absolute left-4 top-1/4 -translate-y-1/2 text-slate-500"></i>
						<input type="password" name="password" required
							class="w-full bg-slate-900/60 border border-slate-700 rounded-2xl py-4 pl-12 pr-4 outline-none focus:border-cyan-500/50 glow-input transition text-white placeholder-slate-600"
							placeholder="••••••••">
					</div>
				</div>
				<select name="targetUrl"
					class="w-full bg-slate-900/60 border border-slate-700 rounded-2xl py-4 px-5 outline-none focus:border-amber-500/50 transition text-white appearance-none cursor-pointer">
				    <option value="/admin/setup-booking" selected>Add Movie in Booking</option>
				    <option value="/admin/manage-screenings">Manage Active Screenings</option>
				    <option value="/displaybookings">View All Ticket Bookings</option>
					<option value="/admin/view-feedbacks">View User Feedbacks</option>
				</select>
				<button type="submit"
					class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 text-slate-900 font-black py-4 rounded-2xl transition transform hover:scale-[1.02] active:scale-95 shadow-xl shadow-cyan-500/20 uppercase tracking-widest mt-4">
					Authorize Access</button>
			</form>

			<div class="mt-8 text-center">
				<a th:href="@{/}"
					class="text-slate-500 hover:text-cyan-400 text-sm transition font-medium">
					<i class="fas fa-arrow-left mr-2"></i> Back to Homepage
				</a>
			</div>
		</div>
		
		<div th:replace="~{fragments/header :: ai-assistant}"></div>

		<p class="text-center text-slate-600 text-xs mt-8">&copy; 2026
			CinePass Systems. Authorized Personnel Only.</p>
	</div>


</body>
</html>
