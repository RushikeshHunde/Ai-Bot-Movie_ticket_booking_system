<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Secure Booking | CinePass</title>
<script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white p-6">


	<div th:unless="${session.admin != null}">
		<a href="/login"
			class="text-xs font-bold bg-cyan-500 text-slate-900 px-6 py-2 rounded-lg hover:bg-cyan-400 transition shadow-lg shadow-cyan-500/20">
			<i class="fas fa-user-shield mr-2"></i>Admin Login
		</a>
	</div>
	<div th:replace="~{fragments/header :: ai-assistant}"></div>
	<h2
		class="text-center text-3xl font-black mb-10 text-cyan-400 uppercase tracking-widest">
		Available Screenings</h2>

	<div th:each="s : ${shows}" th:id="'show-card-' + ${s.id}"
		th:data-start-time="${s.startTime}"
		class="show-card max-w-4xl mx-auto bg-slate-800/50 p-6 rounded-3xl border border-slate-700 mb-10">
		<div class="grid grid-cols-1 md:grid-cols-3 gap-8">

			<div class="md:col-span-1 space-y-4">
				<div class="relative group">
					<img th:src="${s.movieImageUrl}"
						class="w-full h-72 object-cover rounded-2xl shadow-lg border border-slate-700"
						alt="Poster" src="">
				</div>
				<div>
					<h3 class="text-2xl font-black text-white">
						<span th:text="${s.movieTitle}">Movie Name</span> <span
							th:id="'timer-' + ${s.id}"
							class="block text-xs text-amber-500 font-mono mt-1"></span>
					</h3>

					<span
						class="ml-2 text-[10px] bg-slate-700 text-slate-300 px-2 py-1 rounded-md border border-slate-600">
						<i class="fas fa-clock mr-1 text-amber-500"></i> <span
						th:text="${s.movieDuration}">0 min</span>
					</span>
					<p class="text-cyan-400 text-sm uppercase">
						<span th:text="${s.theatreName}">Theatre</span> • <span
							th:text="${s.targetCity}">City</span>
					</p>
				</div>
			</div>

			<div class="md:col-span-2">
				<p
					class="text-[10px] text-gray-500 uppercase tracking-widest mb-6 text-center">Screen
					This Way</p>

				<div class="flex justify-between items-center mb-4 px-2">
					<span
						class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
						Available: <span th:text="${s.availableSeats}"
						class="text-cyan-400">0</span> / <span th:text="${s.totalSeats}">50</span>
					</span> <span
						class="text-[10px] font-bold text-amber-500 uppercase tracking-widest">Screen
						Area</span>
				</div>

				<div class="grid grid-cols-10 gap-2 justify-center mb-8">
					<button th:each="i : ${#numbers.sequence(1, 50)}" type="button"
						th:id="'seat-' + ${s.id} + '-' + ${i}" th:data-seat-num="${i}"
						th:data-booked-list="${s.bookedSeats}"
						th:onclick="|toggleSeat(this, '${s.id}', ${i <= 20 ? 200 : 350})|"
						class="w-8 h-8 rounded-t-lg border text-[10px] flex items-center justify-center seat-btn transition-all 
                   disabled:opacity-20 disabled:grayscale disabled:cursor-not-allowed"
						th:classappend="${i <= 20} ? 'border-purple-900 bg-purple-900/20' : 'border-amber-900 bg-amber-900/20'">
						<span th:text="${i}"></span>
					</button>
				</div>

				<div class="mt-4">
					<div
						th:if="${s.startTime.isBefore(T(java.time.LocalDateTime).now())}">
						<div
							class="bg-red-500/20 border border-red-500 text-red-500 text-center py-4 rounded-2xl font-bold uppercase tracking-widest">
							Show Not Available (Time Passed)</div>
					</div>
					<div th:id="'booking-section-' + ${s.id}"
						th:classappend="${s.startTime.isBefore(T(java.time.LocalDateTime).now())} ? 'hidden' : ''">
						<div th:id="'form-wrapper-' + ${s.id}">

							<form th:action="@{/checkout}" method="post" class="space-y-4"
								action="">

								<div th:id="'expired-msg-' + ${s.id}"
									th:classappend="${s.startTime.isAfter(T(java.time.LocalDateTime).now())} ? 'hidden' : ''"
									class="bg-red-500/20 border border-red-500 text-red-500 p-4 rounded-xl text-center font-bold uppercase">
									<i class="fas fa-clock-rotate-left mr-2"></i> Show No Longer
									Available
								</div>

								<input type="hidden" name="showId" th:value="${s.id}"> <input
									type="hidden" th:id="'input-seats-' + ${s.id}"
									name="selectedSeats"> <input type="hidden"
									th:id="'input-amount-' + ${s.id}" name="totalAmount"
									value="0.0">

								<div
									class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-slate-900/50 p-4 rounded-2xl border border-slate-700/50">
									<div>
										<label
											class="block text-[10px] font-bold text-slate-200 uppercase mb-1">Passenger
											Name</label> <input type="text" name="userName" required
											placeholder="Full Name"
											class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-sm text-white focus:border-cyan-500 outline-none">
									</div>
									<div>
										<label
											class="block text-[10px] font-bold text-slate-200 uppercase mb-1">Email
											Address (For Ticket & Retrieval)</label> <input type="email"
											name="email" required placeholder="example@gmail.com"
											class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-sm text-white outline-none focus:border-cyan-500">
									</div>
									<div>
										<label
											class="block text-[10px] font-bold text-slate-200 uppercase mb-1">Gender</label>
										<select name="gender"
											class="w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-sm text-white outline-none">
											<option value="Male">Male</option>
											<option value="Female">Female</option>
										</select>
									</div>
								</div>

								<div
									class="flex items-center justify-between bg-slate-900 p-4 rounded-2xl border border-slate-700">
									<div class="text-sm">
										<p class="text-slate-400">
											Seats: <span th:id="'count-' + ${s.id}"
												class="text-amber-500 font-bold">0</span>
										</p>
										<p class="text-slate-400">
											Total: <span class="text-green-500 font-bold">₹</span><span
												th:id="'total-' + ${s.id}" class="text-green-500 font-bold">0</span>
										</p>
									</div>
									<button type="submit"
										class="bg-amber-500 hover:bg-amber-400 text-black px-8 py-3 rounded-xl font-bold transition-all">
										BOOK NOW</button>

									<button type="button" th:onclick="|openAdminModal('${s.id}')|"
										class="bg-slate-800 border border-slate-700 text-amber-500 px-6 py-4 rounded-2xl hover:bg-slate-700 transition-all">
										<i class="fas fa-edit"></i>
									</button>
								</div>
							</form>
						</div>
					</div>
				</div>

				<div th:replace="~{admin-auth :: quick-admin-login}"></div>

				<script th:src="@{/js/booking.js}" type="text/javascript"></script>

			</div>
		</div>
	</div>
</body>
</html>
