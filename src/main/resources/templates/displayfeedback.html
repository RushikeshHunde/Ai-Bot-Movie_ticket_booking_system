<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>User Feedbacks | Admin Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white min-h-screen p-8">

	<div class="max-w-6xl mx-auto">
		<header class="flex justify-between items-center mb-10">
			<div>
				<h1
					class="text-3xl font-black tracking-tighter text-cyan-500 uppercase">User
					Feedbacks</h1>
				<p class="text-slate-400">Review what your audience is saying
					about CinePass.</p>
			</div>
			<div class="flex-none w-48">
				<a th:href="@{/}"
					class="text-2xl font-black tracking-tighter text-amber-500 flex items-center">
					<i class="fas fa-film-reader mr-2"></i> CINETIX
				</a>
			</div>
		</header>

		<div
			class="bg-slate-900/50 border border-slate-800 rounded-[2rem] overflow-hidden shadow-2xl">
			<table class="w-full text-left border-collapse">
				<thead>
					<tr
						class="bg-slate-800/50 text-cyan-500 text-xs uppercase tracking-widest">
						<th class="p-6">User</th>
						<th class="p-6">Rating</th>
						<th class="p-6">Message</th>
						<th class="p-6">Action</th>
					</tr>
				</thead>
				<tbody class="divide-y divide-slate-800">
					<tr th:each="fb : ${feedbacks}"
						class="hover:bg-slate-800/30 transition">
						<td class="p-6">
							<div class="font-bold" th:text="${fb.userName}">Name</div>
							<div class="text-xs text-slate-500" th:text="${fb.email}">email@example.com</div>
						</td>
						<td class="p-6">
							<div class="flex text-amber-500">
								<span th:each="i : ${#numbers.sequence(1, fb.rating)}">★</span>
							</div>
						</td>
						<td class="p-6">
							<p class="text-sm text-slate-300 max-w-md italic"
								th:text="${fb.description}">Feedback message goes here...</p>
						</td>
						<td th:if="${session.adminSession != null}" class="p-6 text-right">
							<a th:href="@{'/admin/delete-feedback/' + ${fb.id}}"
							onclick="return confirm('Are you sure you want to delete this feedback?');"
							class="inline-flex items-center justify-center w-10 h-10 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all duration-300">
								<i class="fas fa-trash-alt text-sm"></i>
						</a>
						</td>
					</tr>

					<tr th:if="${#lists.isEmpty(feedbacks)}">
						<td colspan="4" class="p-20 text-center text-slate-500"><i
							class="fas fa-comment-slash text-4xl mb-4 block"></i> No feedback
							received yet.</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
	<div th:replace="~{fragments/header :: ai-assistant}"></div>
</body>
</html>
