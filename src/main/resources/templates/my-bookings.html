<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>My Bookings | CinePass</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body
	class="bg-slate-950 text-slate-200 min-h-screen flex flex-col items-center p-6">

	<nav class="w-full max-w-5xl flex justify-between items-center mb-12">
		<a href="/" class="text-2xl font-black text-cyan-400 italic">CINEPASS</a>
		<a href="/"
			class="text-xs font-bold text-slate-500 hover:text-white transition">BACK
			TO HOME</a>
	</nav>

	<div th:if="${t == null}"
		class="w-full max-w-md bg-slate-900 border border-slate-800 p-10 rounded-[3rem] shadow-2xl">
		<div class="text-center mb-8">
			<div
				class="w-20 h-20 bg-cyan-500/10 rounded-3xl flex items-center justify-center mx-auto mb-4 border border-cyan-500/20">
				<i class="fas fa-ticket-alt text-3xl text-cyan-400"></i>
			</div>
			<h1 class="text-3xl font-black text-white uppercase tracking-tighter">Find
				Ticket</h1>
			<p class="text-slate-500 text-sm mt-2">Enter your details to
				retrieve your booking</p>
		</div>

		<form th:action="@{/my-bookings/search}" method="POST"
			class="space-y-5">
			<div>
				<label
					class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-2">Booking
					ID</label> <input type="text" name="bookingId" required
					placeholder="e.g. 102"
					class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white focus:border-cyan-500 outline-none transition-all">
			</div>
			<div>
				<label class="block text-[10px] font-bold text-slate-500">Email
					Address</label> <input type="email" name="email" required
					class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl">
			</div>

			<p th:if="${error}"
				class="text-red-400 text-xs text-center font-bold"
				th:text="${error}"></p>

			<button type="submit"
				class="w-full bg-cyan-500 hover:bg-cyan-400 text-slate-900 font-black py-4 rounded-2xl transition-all shadow-lg shadow-cyan-500/20 mt-4">
				RETRIEVE TICKET</button>
		</form>
	</div>

	<div th:if="${t != null}"
		class="w-full max-w-2xl animate-in fade-in zoom-in duration-500">
		<div
			class="bg-white text-slate-900 rounded-[2.5rem] overflow-hidden flex flex-col md:flex-row shadow-2xl">

			<div class="md:w-1/3 h-64 md:h-auto relative">
				<img th:src="${t.show.movieImageUrl}"
					class="w-full h-full object-cover" alt="Movie">
				<div
					class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
			</div>

			<div class="md:w-2/3 p-8 flex flex-col justify-between bg-white">
				<div>
					<div class="flex justify-between items-start">
						<h2 class="text-2xl font-black uppercase leading-tight"
							th:text="${t.show.movieTitle}">Movie Name</h2>
						<span
							class="bg-green-100 text-green-700 text-[10px] font-black px-3 py-1 rounded-full">CONFIRMED</span>
					</div>
					<p class="text-cyan-600 font-bold text-xs mt-1 uppercase"
						th:text="${t.show.theatreName} + ' • ' + ${t.show.targetCity}">Theatre</p>

					<div class="grid grid-cols-2 gap-6 mt-8">
						<div>
							<p class="text-[9px] font-bold text-slate-400 uppercase">Date
								& Time</p>
							<p class="text-sm font-bold"
								th:text="${#temporals.format(t.show.startTime, 'dd MMM, hh:mm a')}">Time</p>
						</div>
						<div>
							<p class="text-[9px] font-bold text-slate-400 uppercase">Seats</p>
							<p class="text-sm font-bold text-amber-600"
								th:text="${t.seatsBooked}">A1, A2</p>
						</div>
					</div>
				</div>

				<div
					class="mt-8 pt-6 border-t border-dashed border-slate-200 flex items-center justify-between">
					<div>
						<p class="text-[9px] font-bold text-slate-400 uppercase">Booking
							ID</p>
						<p class="text-lg font-black" th:text="'#' + ${t.bookingId}"></p>
					</div>

					<div class="flex flex-col items-end">
						<p class="text-[9px] font-bold text-slate-400 uppercase">Registered
							Email</p>
						<p class="text-sm font-bold text-slate-600"
							th:text="${t.user.email}"></p>
					</div>
					<div class="flex gap-2">
						<a th:href="@{/download-ticket/{id}(id=${t.bookingId})}"
							class="bg-slate-900 text-white p-3 rounded-xl hover:bg-slate-800 transition">
							<i class="fas fa-download"></i>
						</a>
						<button onclick="window.print()"
							class="bg-slate-100 text-slate-600 p-3 rounded-xl hover:bg-slate-200 transition">
							<i class="fas fa-print"></i>
						</button>
					</div>
				</div>
			</div>
		</div>

		<div class="mt-8 text-center">
			<a href="/my-bookings"
				class="text-slate-500 hover:text-cyan-400 text-xs font-bold uppercase tracking-widest transition">
				<i class="fas fa-search mr-2"></i> Search another ticket
			</a>
		</div>
	</div>
	
	<div th:replace="~{fragments/header :: ai-assistant}"></div>

</body>
</html>
