<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Setup Booking | CinePass</title>
<script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
</head>
<body class="bg-slate-900 text-white p-10">
	<div
		class="max-w-2xl mx-auto bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl">
		<h2 class="text-3xl font-black mb-6 text-amber-500 uppercase">New
			Screening Setup</h2>

		<form th:action="@{/admin/save-show}" th:object="${show}"
			method="post" class="space-y-5" enctype="multipart/form-data"
			action="">

			<div>
				<label class="block text-xs font-bold text-cyan-500 uppercase mb-2">Movie
					Title</label> <input type="text" th:field="*{movieTitle}"
					placeholder="e.g. Inception" required
					class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-amber-500 transition">
			</div>

			<div>
				<label class="block text-xs font-bold text-cyan-500 uppercase mb-2">Upload
					Movie Poster</label>
				<div class="relative group">
					<input type="file" name="imageFile" accept="image/*" required
						class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-amber-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-500 file:text-slate-900 hover:file:bg-cyan-400 cursor-pointer">
				</div>
			</div>

			<div class="grid grid-cols-2 gap-4">
				<div>
					<label class="block text-xs font-bold text-cyan-500 uppercase mb-2">Theatre
						Name</label> <input type="text" th:field="*{theatreName}"
						placeholder="PVR Cinemas" required
						class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-amber-500 transition">
				</div>
				<div>
					<label class="block text-xs font-bold text-cyan-500 uppercase mb-2">City
						/ Venue</label> <input type="text" th:field="*{targetCity}"
						list="mall-locations" placeholder="Search or type a location..."
						required
						class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-amber-500 transition">

					<datalist id="mall-locations">
						<option value="Amanora Mall, Hadapsar"></option>
						<option value="Westend Mall, Aundh"></option>
						<option value="SB Road, Shivajinagar"></option>
					</datalist>
				</div>
				<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
					<div class="space-y-2">
						<label
							class="block text-xs font-bold text-cyan-500 uppercase mb-2">Show
							Date & Time</label> <input type="datetime-local" th:field="*{startTime}"
							required
							class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-amber-500 transition text-white">
					</div>
					<div class="mb-4">
						<label class="block text-slate-400 mb-2">Movie Duration
							(e.g., 140 min)</label> <input type="text" name="movieDuration"
							th:value="${show.movieDuration}"
							class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-white">
					</div>
					<div class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
				</div>

				<div>
					<label class="block text-xs font-bold text-cyan-500 uppercase mb-2">Assign
						Hall</label>
					<div class="relative">
						<select th:field="*{hallNumber}" required
							class="w-full bg-slate-900 border border-slate-700 p-4 rounded-2xl outline-none focus:border-amber-500 transition appearance-none cursor-pointer">
							<option value="" disabled selected>Select a Hall</option>
							<option value="H1">Hall 1 (VIP)</option>
							<option value="H2">Hall 2</option>
							<option value="H3">Hall 3</option>
							<option value="H4">Hall 4</option>
							<option value="H5">Hall 5 (IMAX)</option>
							<option value="H6">Hall 6</option>
							<option value="H7">Hall 7</option>
							<option value="H8">Hall 8</option>
							<option value="H9">Hall 9</option>
							<option value="H10">Hall 10</option>
						</select> <i
							class="fas fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-500 pointer-events-none"></i>
					</div>
				</div>
				<button type="submit"
					class="w-full bg-amber-500 hover:bg-amber-400 text-black font-black py-4 rounded-2xl transition shadow-xl uppercase tracking-widest mt-4">
					Add to Booking Gallery</button>

				<div th:replace="~{fragments/header :: ai-assistant}"></div>
			</div>
		</form>
	</div>
</body>
</html>
