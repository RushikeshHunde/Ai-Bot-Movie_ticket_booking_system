<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Your Ticket | CinePass</title>
<script src="https://cdn.tailwindcss.com" type="text/javascript"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style type="text/css">
@media print { .no-print { display: none; } }
</style>
</head>
<body class="bg-slate-950 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="max-w-3xl w-full bg-white text-slate-900 rounded-[2rem] overflow-hidden shadow-2xl flex h-72">

        <div class="w-1/3 h-full relative">
            <img th:src="${t.movieImageUrl}" class="w-full h-full object-cover" alt="Poster">
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
            <div class="absolute bottom-4 left-4">
                <h2 class="text-white font-black uppercase text-xl" th:text="${t.displayMovieTitle}">MOVIE TITLE</h2>
            </div>
        </div>

        <div class="w-2/3 flex flex-row">
            <div class="flex-1 p-6 flex flex-col justify-between">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Cinema & Location</p>
                    <p class="text-sm font-black text-cyan-600 uppercase mb-4" th:text="${t.displayHall}">HALL INFO</p>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Passenger</p>
                            <p class="font-bold text-xs" th:text="${t.customerName}">Customer Name</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Email</p>
                            <p class="font-bold text-[10px] truncate" th:text="${t.customerEmail}">email@example.com</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Date/Time</p>
                            <p class="font-bold text-xs" th:text="${t.displayShowTime}">Time</p>
                        </div>
                        <div>
                            <p class="text-[10px] font-bold text-slate-400 uppercase">Seats</p>
                            <p class="font-bold text-xs text-cyan-600" th:text="${t.seatNumbers}">A1, A2</p>
                        </div>
                    </div>
                </div>

                <div class="pt-4 border-t border-dashed border-slate-200">
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Total Paid</p>
                    <p class="text-2xl font-black text-green-600">
                        ₹<span th:text="${t.totalAmount}">0.00</span>
                    </p>
                </div>
            </div>

            <div class="w-32 bg-slate-50 border-l-2 border-dashed border-slate-200 flex flex-col items-center justify-center p-4 relative">
                <div class="absolute -top-3 -left-3.5 w-7 h-7 bg-slate-950 rounded-full"></div>
                <div class="absolute -bottom-3 -left-3.5 w-7 h-7 bg-slate-950 rounded-full"></div>

                <img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=TicketID:' + ${t.ticketId}"
                    class="w-20 h-20 mix-blend-multiply" alt="QR">

                <div class="mt-4 text-center">
                    <p class="text-[8px] font-mono text-slate-400 uppercase leading-none">Ticket ID</p>
                    <p class="text-[10px] font-bold text-slate-800" th:text="'#' + ${t.ticketId}">#ID</p>
                </div>
                <p class="mt-2 text-[7px] font-bold text-slate-400 uppercase tracking-tighter rotate-180 [writing-mode:vertical-lr]">Scan at Gate</p>
            </div>
        </div>
    </div>

    <div class="mt-10 flex flex-col items-center gap-6 no-print">
        <div class="flex items-center gap-2 text-cyan-500 bg-cyan-500/10 px-4 py-2 rounded-full border border-cyan-500/20">
            <i class="fas fa-check-circle text-xs"></i> 
            <span class="text-[10px] font-black uppercase tracking-widest">Ticket Generated Successfully</span>
        </div>

        <div class="flex items-center gap-4">
            <a href="/" class="flex items-center gap-2 bg-slate-800 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-700 transition border border-slate-700">
                <i class="fas fa-house text-slate-400"></i> <span>Home</span>
            </a>
            <button onclick="window.print()" class="flex items-center gap-2 bg-slate-800 text-white px-6 py-3 rounded-2xl font-bold hover:bg-slate-700 transition border border-slate-700">
                <i class="fas fa-print text-slate-400"></i> <span>Print Ticket</span>
            </button>
        </div>
    </div>

    <script th:inline="javascript">
        window.onload = function() {
            const ticketId = /*[[${t.ticketId}]]*/ null;
            if(ticketId) {
                console.log("Ticket Loaded: " + ticketId);
                // Optional: Auto-download trigger if your backend supports it
                // setTimeout(() => { window.location.href = '/download-ticket/' + ticketId; }, 1500);
            }
        };
    </script>
    
            <div th:replace="~{fragments/header :: ai-assistant}"></div>
</body>
</html>
